<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACA Study Hub - Advanced Computer Architectures</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            surface: { DEFAULT: '#0f172a', light: '#1e293b', lighter: '#334155' },
            modern: { DEFAULT: '#3b82f6', dark: '#1d4ed8', light: '#60a5fa' },
            cache: { DEFAULT: '#22c55e', dark: '#15803d', light: '#4ade80' }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/custom.css">
</head>
<body class="bg-surface text-gray-100 min-h-screen flex flex-col">

  <!-- Top bar -->
  <header class="bg-surface-light border-b border-gray-700 px-4 py-3 flex items-center justify-between sticky top-0 z-50">
    <button id="nav-toggle" class="md:hidden text-gray-400 hover:text-white">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <h1 class="text-lg font-bold">
      <span class="text-modern">ACA</span> Study Hub
    </h1>
    <span class="text-xs text-gray-500 hidden sm:inline">Advanced Computer Architectures - IPPV131-K2</span>
  </header>

  <div class="flex flex-1 overflow-hidden">
    <!-- Sidebar (desktop) -->
    <nav id="sidebar" class="hidden md:flex flex-col w-56 bg-surface-light border-r border-gray-700 p-4 gap-1 shrink-0 overflow-y-auto">
      <button class="nav-item active flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium border-l-2 hover:bg-surface-lighter transition" data-mode="dashboard">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0h4"/></svg>
        Dashboard
      </button>

      <div class="mt-3 mb-1 px-3 text-[10px] font-semibold text-gray-500 uppercase tracking-wider">Study by Topic</div>
      <button class="nav-item flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium border-l-2 border-transparent hover:bg-surface-lighter transition" data-mode="topics-modern">
        <span class="w-2 h-2 rounded-full bg-modern shrink-0"></span>
        Modern Solutions
      </button>
      <div id="sidebar-modern-topics" class="hidden ml-5 space-y-0.5"></div>
      <button class="nav-item flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium border-l-2 border-transparent hover:bg-surface-lighter transition" data-mode="topics-cache">
        <span class="w-2 h-2 rounded-full bg-cache shrink-0"></span>
        Cache
      </button>
      <div id="sidebar-cache-topics" class="hidden ml-5 space-y-0.5"></div>

      <div class="mt-3 mb-1 px-3 text-[10px] font-semibold text-gray-500 uppercase tracking-wider">Practice (Mixed)</div>
      <button class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium border-l-2 border-transparent hover:bg-surface-lighter transition" data-mode="oral">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
        Oral Simulator
      </button>
      <button class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium border-l-2 border-transparent hover:bg-surface-lighter transition" data-mode="flashcards">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
        Flashcards
      </button>
      <button class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium border-l-2 border-transparent hover:bg-surface-lighter transition" data-mode="problems">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
        Problems
      </button>
    </nav>

    <!-- Mobile sidebar overlay -->
    <div id="mobile-overlay" class="hidden fixed inset-0 bg-black/50 z-40 md:hidden"></div>
    <nav id="mobile-sidebar" class="hidden fixed left-0 top-0 bottom-0 w-64 bg-surface-light z-50 p-4 flex flex-col gap-1 md:hidden overflow-y-auto">
      <div class="flex justify-between items-center mb-4">
        <h2 class="font-bold text-modern">Menu</h2>
        <button id="close-sidebar" class="text-gray-400 hover:text-white">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <button class="mobile-nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium hover:bg-surface-lighter transition" data-mode="dashboard">Dashboard</button>
      <div class="mt-2 mb-1 px-3 text-[10px] font-semibold text-gray-500 uppercase tracking-wider">Study by Topic</div>
      <button class="mobile-nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium hover:bg-surface-lighter transition" data-mode="topics-modern">
        <span class="w-2 h-2 rounded-full bg-modern"></span> Modern Solutions
      </button>
      <button class="mobile-nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium hover:bg-surface-lighter transition" data-mode="topics-cache">
        <span class="w-2 h-2 rounded-full bg-cache"></span> Cache
      </button>
      <div class="mt-2 mb-1 px-3 text-[10px] font-semibold text-gray-500 uppercase tracking-wider">Practice (Mixed)</div>
      <button class="mobile-nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium hover:bg-surface-lighter transition" data-mode="oral">Oral Simulator</button>
      <button class="mobile-nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium hover:bg-surface-lighter transition" data-mode="flashcards">Flashcards</button>
      <button class="mobile-nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium hover:bg-surface-lighter transition" data-mode="problems">Problems</button>
    </nav>

    <!-- Main content -->
    <main id="content" class="flex-1 overflow-y-auto p-4 md:p-6">
      <!-- Filled dynamically by app.js -->
    </main>
  </div>

  <!-- Bottom tabs (mobile) -->
  <nav class="md:hidden bg-surface-light border-t border-gray-700 flex justify-around py-2 sticky bottom-0 z-30">
    <button class="bottom-tab flex flex-col items-center gap-0.5 px-2 py-1 text-xs text-gray-400" data-mode="dashboard">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0h4"/></svg>
      Home
    </button>
    <button class="bottom-tab flex flex-col items-center gap-0.5 px-2 py-1 text-xs text-gray-400" data-mode="oral">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
      Oral
    </button>
    <button class="bottom-tab flex flex-col items-center gap-0.5 px-2 py-1 text-xs text-gray-400" data-mode="topics-modern">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
      Topics
    </button>
    <button class="bottom-tab flex flex-col items-center gap-0.5 px-2 py-1 text-xs text-gray-400" data-mode="flashcards">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
      Cards
    </button>
    <button class="bottom-tab flex flex-col items-center gap-0.5 px-2 py-1 text-xs text-gray-400" data-mode="problems">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
      Problems
    </button>
  </nav>

  <script src="js/data.js"></script>
  <script src="js/translations-vi.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
